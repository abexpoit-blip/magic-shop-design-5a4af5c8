name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          command_timeout: 14m
          script: |
            set -euo pipefail
            APP=/var/www/cruzercc

            echo "▶ Preparing app directory..."
            if [ ! -d "$APP/.git" ]; then
              rm -rf $APP
              git clone https://github.com/abexpoit-blip/magic-shop-design.git $APP
            fi

            cd $APP
            git fetch origin main
            git reset --hard origin/main
            chmod +x $APP/deploy.sh
            DEPLOY_SKIP_GIT_PULL=1 $APP/deploy.sh
