name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            APP=/var/www/cruzercc
            REPO=https://github.com/abexpoit-blip/magic-shop-design.git

            # Ensure dirs
            mkdir -p $APP/frontend $APP/data /var/log/cruzercc

            # Clone or pull
            if [ ! -d "$APP/.git" ]; then
              rm -rf $APP
              git clone $REPO $APP
            fi
            cd $APP
            git fetch origin main
            git reset --hard origin/main

            # ── Frontend build ──
            npm install
            VITE_API_BASE=/api npm run build
            rm -rf $APP/frontend/*
            cp -r dist/* $APP/frontend/

            # ── Backend build ──
            cd $APP/backend
            npm install
            npm run build

            # ── Seed accounts (idempotent — runs every deploy) ──
            cd $APP/backend
            npx tsx scripts/seed-admin.ts

            # ── Restart backend ──
            pm2 reload cruzercc-api --update-env 2>/dev/null || pm2 start $APP/backend/ecosystem.config.cjs
            pm2 save

            # ── Nginx ──
            cp $APP/nginx/cruzercc.conf /etc/nginx/sites-available/cruzercc.conf
            ln -sf /etc/nginx/sites-available/cruzercc.conf /etc/nginx/sites-enabled/
            nginx -t && systemctl reload nginx

            # ── Health check ──
            sleep 2
            curl -sf http://127.0.0.1:8080/api/health || echo "⚠️ Health check failed"
            echo "✅ Deploy complete"
