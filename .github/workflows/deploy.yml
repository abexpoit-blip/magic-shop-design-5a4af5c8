name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Deploy via SSH ──
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            APP_DIR=/var/www/cruzercc
            REPO_URL=https://github.com/abexpoit-blip/magic-shop-design.git

            # Ensure dirs exist
            mkdir -p $APP_DIR/frontend $APP_DIR/backend $APP_DIR/uploads /var/log/cruzercc

            # Ensure repo exists and is current
            if [ ! -d "$APP_DIR/.git" ]; then
              rm -rf $APP_DIR
              git clone $REPO_URL $APP_DIR
            fi

            cd $APP_DIR
            git fetch origin main
            git reset --hard origin/main

            # ── Frontend ──
            npm ci
            VITE_API_BASE=/api npm run build
            rm -rf $APP_DIR/frontend/*
            cp -r dist/* $APP_DIR/frontend/
            test -f $APP_DIR/frontend/index.html
            grep -q '/assets/' $APP_DIR/frontend/index.html

            # ── Backend ──
            cd $APP_DIR/backend
            npm ci
            npm run build
            test -f $APP_DIR/backend/dist/server.js

            # ── Database migrations ──
            cd $APP_DIR/backend
            npx tsx scripts/migrate.ts || echo "Migration skipped or already up-to-date"

            # ── Restart backend ──
            pm2 reload cruzercc-api --update-env || pm2 start $APP_DIR/backend/ecosystem.config.cjs
            pm2 save
            curl -sf http://127.0.0.1:8080/api/health > /dev/null

            # ── Reload nginx ──
            sudo nginx -t && sudo systemctl reload nginx

            echo "✅ Deployed successfully"
