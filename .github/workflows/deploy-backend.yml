name: Deploy Backend to VPS

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch: {}

jobs:
  deploy:
    name: Deploy backend to VPS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            APP=/var/www/cruzercc
            cd $APP
            echo "▶ Pulling latest code..."
            git pull origin main

            cd $APP/backend
            echo "▶ Installing dependencies..."
            npm install
            echo "▶ Building..."
            npm run build
            echo "▶ Running migrations..."
            npm run migrate || echo "⚠️  Migration warnings (non-fatal)"

            echo "▶ Starting/reloading API..."
            if pm2 describe cruzercc-api > /dev/null 2>&1; then
              pm2 reload cruzercc-api --update-env
            else
              pm2 start $APP/backend/ecosystem.config.cjs
            fi
            pm2 save

            BACKEND_PORT=$(grep -oP '^PORT=\K\d+' "$APP/backend/.env" 2>/dev/null || echo "8080")

            echo "▶ Health check..."
            ok=false
            for i in $(seq 1 15); do
              if curl -sf "http://127.0.0.1:${BACKEND_PORT}/api/health" | grep -q '"ok":true'; then
                echo "✅ Backend healthy"
                ok=true
                break
              fi
              sleep 2
            done
            if [ "$ok" = false ]; then
              echo "❌ Backend health check FAILED"
              pm2 logs cruzercc-api --lines 30 --nostream || true
              exit 1
            fi
            echo "✅ Backend deployed."
