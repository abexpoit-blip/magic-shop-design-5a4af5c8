##
## Nginx config for api.cruzercc.shop (VPS API backend)
##
## INSTALL:
##   sudo cp nginx/cruzercc.conf /etc/nginx/sites-available/cruzercc-api.conf
##   sudo ln -sf /etc/nginx/sites-available/cruzercc-api.conf /etc/nginx/sites-enabled/
##   sudo nginx -t && sudo systemctl reload nginx
##
## SSL:
##   sudo certbot certonly --standalone -d api.cruzercc.shop
##   (or use --nginx if certbot nginx plugin is installed)
##

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name api.cruzercc.shop;
    return 301 https://$host$request_uri;
}

# HTTPS — proxy everything to Node backend on port 8080
server {
    listen 443 ssl http2;
    server_name api.cruzercc.shop;

    # --- SSL certs (certbot / Let's Encrypt) ---
    ssl_certificate     /etc/letsencrypt/live/api.cruzercc.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.cruzercc.shop/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── API proxy ──
    location /api/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        # CORS — allow all origins (Lovable preview + production)
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
        add_header Access-Control-Max-Age 86400 always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With";
            add_header Access-Control-Max-Age 86400;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # Root — simple health check fallback
    location / {
        return 404 '{"error":"Not found. API routes start with /api/"}';
        add_header Content-Type application/json;
    }

    # Uploaded files
    location /uploads/ {
        alias /var/www/cruzercc/uploads/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
}
