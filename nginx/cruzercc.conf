##
## Nginx config for cruzercc.shop
## Copy to /etc/nginx/sites-available/cruzercc.conf
## then: ln -sf /etc/nginx/sites-available/cruzercc.conf /etc/nginx/sites-enabled/
##       nginx -t && systemctl reload nginx
##

server {
    listen 80;
    server_name cruzercc.shop www.cruzercc.shop;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name cruzercc.shop www.cruzercc.shop;

    # --- SSL certs (adjust paths to match your setup / certbot) ---
    ssl_certificate     /etc/letsencrypt/live/cruzercc.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cruzercc.shop/privkey.pem;

    # --- Static frontend ---
    root /var/www/cruzercc/frontend/dist;
    index index.html;

    # ================================================================
    # API — proxy to Node backend (adjust port if needed)
    # This MUST come BEFORE the SPA fallback so /api/* never hits index.html
    # ================================================================
    location /api/ {
        proxy_pass         http://127.0.0.1:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        # CORS for Lovable preview
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*";
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Authorization, Content-Type";
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # SPA fallback — ONLY for non-API routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
