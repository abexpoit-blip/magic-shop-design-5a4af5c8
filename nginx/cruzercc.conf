##
## Nginx config for cruzercc.shop (frontend + /api proxy)
##
## INSTALL:
##   sudo cp nginx/cruzercc.conf /etc/nginx/sites-available/cruzercc
##   sudo rm -f /etc/nginx/sites-enabled/default /etc/nginx/sites-enabled/cruzercc /etc/nginx/sites-enabled/cruzercc.conf /etc/nginx/sites-enabled/cruzercc-api.conf
##   sudo ln -sf /etc/nginx/sites-available/cruzercc /etc/nginx/sites-enabled/cruzercc
##   sudo nginx -t && sudo systemctl reload nginx
##
## SSL:
##   sudo certbot --nginx -d cruzercc.shop -d www.cruzercc.shop
##

server {
    listen 80;
    server_name cruzercc.shop www.cruzercc.shop;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name cruzercc.shop www.cruzercc.shop;

    root /var/www/cruzercc/frontend;
    index index.html;

    ssl_certificate     /etc/letsencrypt/live/cruzercc.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cruzercc.shop/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Gzip compression ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml image/svg+xml font/woff2;

    # ── CORS preflight (separate location to avoid dangerous "if") ──
    location = /api/options_dummy_never_matches {
        # placeholder — CORS is handled by Express via cors() middleware
    }

    # ── API proxy ──
    location /api/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ── Uploads (user content) ──
    location /uploads/ {
        alias /var/www/cruzercc/uploads/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # ── Hashed build assets (JS, CSS, images, fonts) — cache forever ──
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # ── index.html — never cache (so new deploys take effect immediately) ──
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }

    # ── SPA fallback ──
    location / {
        try_files $uri $uri/ /index.html;
    }
}
